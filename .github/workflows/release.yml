name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-26-intel
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package binary
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          RUNNER: ${{ matrix.runner }}
        run: |
          BIN=queso
          if [[ "$RUNNER" == "windows-latest" ]]; then
            BIN=queso.exe
          fi
          cp "target/${TARGET}/release/$BIN" "$BIN"
          if [[ "$RUNNER" == "windows-latest" ]]; then
            7z a "queso-${TARGET}.zip" "$BIN"
          else
            tar czf "queso-${TARGET}.tar.gz" "$BIN"
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: queso-${{ matrix.target }}
          path: queso-${{ matrix.target }}.*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum queso-* > checksums-sha256.txt
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*
