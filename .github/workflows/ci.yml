name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
      - run: cargo test

  e2e:
    name: E2E (${{ matrix.runner }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        runner:
          - macos-latest
          - macos-26-intel
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.15.4"
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"
      - name: Run E2E test
        shell: bash
        run: bash scripts/e2e-test.sh

  cross-build:
    name: Cross Build (Linux -> macOS + Windows)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.15.4"
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"
      - name: Build queso
        run: cargo build --release
      - name: Cross-compile test app
        run: |
          cd "$RUNNER_TEMP"
          gleam new test_app
          cd test_app
          "$GITHUB_WORKSPACE/target/release/queso" build \
            --target aarch64-macos \
            --target x86_64-macos \
            --target x86_64-windows
          ls -la build/queso/
      - name: Upload cross-compiled binaries
        uses: actions/upload-artifact@v7
        with:
          name: cross-compiled-binaries
          path: ${{ runner.temp }}/test_app/build/queso/

  cross-run:
    name: Cross Run (${{ matrix.runner }})
    needs: cross-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            binary: test_app-1.0.0-aarch64-macos
          - runner: macos-26-intel
            binary: test_app-1.0.0-x86_64-macos
          - runner: windows-latest
            binary: test_app-1.0.0-x86_64-windows.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Download cross-compiled binaries
        uses: actions/download-artifact@v8
        with:
          name: cross-compiled-binaries
      - name: Run cross-compiled binary
        shell: bash
        run: |
          chmod +x "$BINARY" 2>/dev/null || true
          OUTPUT=$("./$BINARY")
          if echo "$OUTPUT" | grep -q "Hello from test_app!"; then
            echo "PASS: $BINARY"
          else
            echo "FAIL: Expected 'Hello from test_app!' in output:"
            echo "$OUTPUT"
            exit 1
          fi
        env:
          BINARY: ${{ matrix.binary }}
